[project]
name = "cert-prep-ocr-windowsml"
version = "0.1.0"
description = "WindowsML OCR runtime and diagnostics for the cert prep desktop app."
readme = "README.md"
requires-python = ">=3.12,<3.14"
dependencies = [
  "cert-prep-contracts",
]

[project.optional-dependencies]
windowsml = [
  "numpy>=2.0.0,<3.0.0",
  "onnx>=1.16.1,<=1.17.0",
  "onnxruntime-windowsml>=1.24.0,<2.0.0",
  "opencv-contrib-python>=4.10.0,<5.0.0",
  "paddleocr==3.7.0",
  "paddle2onnx==2.1.0; python_version < '3.13'",
  "paddlepaddle==3.3.0; python_version < '3.13'",
  "paddlex[ocr-core]==3.7.1",
  "pypdfium2>=5.0.0,<6.0.0",
  "pyclipper>=1.3.0,<2.0.0",
  "shapely>=2.0.0,<3.0.0",
  "wasdk-Microsoft.Windows.AI.MachineLearning[all]>=0.2.0; sys_platform == 'win32'",
  "wasdk-Microsoft.Windows.ApplicationModel.DynamicDependency.Bootstrap>=0.2.0; sys_platform == 'win32'",
]

[[tool.uv.index]]
name = "paddle-cpu"
url = "https://www.paddlepaddle.org.cn/packages/stable/cpu/"
explicit = true

[tool.uv.sources]
cert-prep-contracts = { path = "../cert-prep-contracts", editable = true }
paddlepaddle = { index = "paddle-cpu" }

[dependency-groups]
dev = [
  "pytest>=8.3.0,<9.0.0",
  "ruff>=0.9.0,<1.0.0",
]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py312"
