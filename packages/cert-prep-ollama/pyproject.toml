[project]
name = "cert-prep-ollama"
version = "0.1.0-alpha.1"
description = "Ollama infrastructure utilities shared across cert-prep projects."
readme = "README.md"
requires-python = ">=3.12,<3.14"
dependencies = [
    "cert-prep-contracts",
    "httpx>=0.27.0,<1.0.0",
    "ollama>=0.6.0,<1.0.0",
]

[tool.uv.sources]
cert-prep-contracts = { path = "../cert-prep-contracts", editable = true }

[dependency-groups]
dev = [
    "pytest>=8.3.0,<9.0.0",
    "ruff>=0.9.0,<1.0.0",
]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py312"
