[project]
name = "cert-prep-ollama"
version = "0.1.0"
description = "Ollama infrastructure utilities shared across cert-prep projects."
readme = "README.md"
requires-python = ">=3.12,<3.14"
dependencies = [
    "ollama>=0.6.0,<1.0.0",
]

[dependency-groups]
dev = [
    "pytest>=8.3.0,<9.0.0",
    "ruff>=0.9.0,<1.0.0",
]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py312"
