name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: 'true'
  NX_CLOUD_DISTRIBUTED_EXECUTION: 'false'
  PYTHON_VERSION: '3.12'

jobs:
  portable-quality:
    name: Portable quality
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 10.33.2
          run_install: false

      - name: Install Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          version: 0.9.18
          enable-cache: true
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync backend Python environment
        run: uv sync --project apps/cert-prep-backend --python ${{ env.PYTHON_VERSION }} --frozen

      - name: Lint and test portable projects
        run: >-
          pnpm nx run-many -t lint test
          --projects=cert-prep,cert-prep-contracts,cert-prep-ollama,cert-prep-ocr-windowsml,cert-prep-backend
          --parallel=3

      - name: Build Angular application
        run: pnpm nx run cert-prep:build

      - name: Install Chromium for browser integration
        run: pnpm exec playwright install --with-deps chromium

      - name: Test mocked browser regression
        run: pnpm nx run cert-prep-e2e:e2e --args="--project=chromium --workers=2"

      - name: Test the browser against the real backend
        run: pnpm nx run cert-prep-e2e:e2e-real-backend

  windows-quality:
    name: Windows product quality
    runs-on: windows-2025
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 10.33.2
          run_install: false

      - name: Install Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          version: 0.9.18
          enable-cache: true
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Rust
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal --component clippy,rustfmt
          rustup show active-toolchain

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync backend Python environment
        run: uv sync --project apps/cert-prep-backend --python ${{ env.PYTHON_VERSION }} --frozen

      - name: Test Windows-owned Python and Angular projects
        run: >-
          pnpm nx run-many -t lint test
          --projects=cert-prep-contracts,cert-prep-ollama,cert-prep-ocr-windowsml,cert-prep-backend,cert-prep
          --parallel=2

      - name: Type-check desktop scripts
        run: pnpm nx run cert-prep-desktop:typecheck-scripts

      - name: Test package QA
        run: pnpm nx run cert-prep-desktop:package-qa-test

      - name: Test Tauri host
        run: pnpm nx run cert-prep-desktop:cargo-test
